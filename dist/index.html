<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nostr District</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./apple-touch-icon.png">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nostr District">

  <!-- OG / Social Preview -->
  <meta property="og:title" content="Nostr District">
  <meta property="og:description" content="A pixel art social world on Nostr">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Nostr District">
  <meta name="twitter:description" content="A pixel art social world on Nostr">
  <meta name="twitter:image" content="/og-image.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100dvh; overflow: hidden; background: #0D0221; }
    #game-container {
      width: 100%;
      /* Reserve space for the chat bar so the canvas doesn't render behind it */
      height: calc(100dvh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #game-container canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* ── Rotate prompt (portrait only on touch devices) ── */
    #rotate-prompt {
      display: none;
      position: fixed; inset: 0; z-index: 99999;
      background: #0D0221;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: 'Courier New', monospace;
      color: #9b7fe8;
      text-align: center;
      padding: 32px;
    }
    #rotate-prompt .rotate-icon {
      font-size: 56px;
      animation: rotate-hint 2s ease-in-out infinite;
    }
    #rotate-prompt p {
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      40%       { transform: rotate(90deg); }
      60%       { transform: rotate(90deg); }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      #rotate-prompt { display: flex; }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DruAbcvX.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/phaser-CaWnzXme.js">
</head>
<body>
  <div id="rotate-prompt">
    <div class="rotate-icon">📱</div>
    <p>NOSTR DISTRICT<br><br>Rotate your device<br>to landscape to play</p>
  </div>
  <div id="game-container"></div>
</body>
</html>
